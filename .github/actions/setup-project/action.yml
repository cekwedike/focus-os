name: Setup Focus OS project
description: Install Node.js, pnpm, native build tools, and dependencies

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: pnpm

    - name: Install Linux native build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 make g++ pkg-config libsqlite3-dev

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
