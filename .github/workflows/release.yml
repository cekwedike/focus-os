name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.1.0). Must match package.json version.
        required: true
        type: string
      draft:
        description: Publish as a draft GitHub Release
        type: boolean
        default: false
      prerelease:
        description: Mark the GitHub Release as a pre-release
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows exe
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: TypeScript type check
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
        env:
          CI: true

      - name: Build Windows executable
        run: pnpm build:exe

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: Focus OS ${{ steps.release_tag.outputs.value }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            release/*.exe
            release/*.exe.blockmap
          generate_release_notes: true
